name: Build Lumina-OS ISO

on:
  push:
    branches:
      - main
    paths:
      - "archiso-profile/**"
      - "scripts/**"
      - ".github/workflows/build-iso.yml"
  workflow_dispatch:
    inputs:
      build_set:
        description: "Which build modes to run"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - stable
          - login-test
      run_label:
        description: "Optional run label prefix"
        required: false
        type: string

permissions:
  contents: read

jobs:
  build-iso:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    strategy:
      fail-fast: false
      matrix:
        mode:
          - stable
          - login-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve build selection
        id: selection
        shell: bash
        run: |
          set -euo pipefail

          skip="false"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            selected_set="${{ github.event.inputs.build_set }}"
            if [[ "${selected_set}" != "all" && "${selected_set}" != "${{ matrix.mode }}" ]]; then
              skip="true"
            fi
          fi

          echo "skip=${skip}" >> "${GITHUB_OUTPUT}"

      - name: Resolve run label
        id: meta
        if: steps.selection.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail

          input_label="${{ github.event.inputs.run_label }}"
          if [[ -n "${input_label}" ]]; then
            safe_label="$(printf '%s' "${input_label}" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9.-]+/-/g; s/^-+//; s/-+$//')"
            run_label="${safe_label}-${{ matrix.mode }}"
          else
            run_label="gha-${{ matrix.mode }}-${{ github.run_number }}-${{ github.run_attempt }}"
          fi

          echo "run_label=${run_label}" >> "${GITHUB_OUTPUT}"

      - name: Pull official Arch Linux image
        if: steps.selection.outputs.skip != 'true'
        shell: bash
        run: sudo docker pull archlinux:base-devel

      - name: Build ISO inside Arch container
        id: build
        if: steps.selection.outputs.skip != 'true'
        continue-on-error: true
        shell: bash
        env:
          MODE: ${{ matrix.mode }}
          RUN_LABEL: ${{ steps.meta.outputs.run_label }}
        run: |
          set -euo pipefail

          mkdir -p "build/github-logs/${MODE}"
          log_path="build/github-logs/${MODE}/${RUN_LABEL}.log"

          set +e
          sudo docker run --rm --privileged \
            -e MODE="${MODE}" \
            -e RUN_LABEL="${RUN_LABEL}" \
            -v "${GITHUB_WORKSPACE}:/repo" \
            -w /repo \
            archlinux:base-devel \
            bash -lc '
              set -euo pipefail
              bash ./scripts/bootstrap-arch-build-env.sh --install
              bash ./scripts/build-iso-arch.sh \
                --mode "${MODE}" \
                --run-label "${RUN_LABEL}" \
                --work "/repo/build/github-work/${MODE}" \
                --out "/repo/build/github-out/${MODE}" \
                --stage-root "/repo/build/github-stage"
              bash ./scripts/export-build-handoff.sh \
                --mode "${MODE}" \
                --run-label "${RUN_LABEL}" \
                --out-dir "/repo/build/github-handoff/${MODE}"
            ' 2>&1 | tee "${log_path}"
          exit_code="${PIPESTATUS[0]}"
          set -e

          echo "log_path=${log_path}" >> "${GITHUB_OUTPUT}"
          echo "exit_code=${exit_code}" >> "${GITHUB_OUTPUT}"

      - name: Restore workspace ownership
        if: always() && steps.selection.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          for candidate in "${GITHUB_WORKSPACE}/build" "${GITHUB_WORKSPACE}/status"; do
            if [[ -e "${candidate}" ]]; then
              sudo chown -R "$(id -u):$(id -g)" "${candidate}"
            fi
          done

      - name: Summarize build output
        if: always() && steps.selection.outputs.skip != 'true'
        shell: bash
        env:
          MODE: ${{ matrix.mode }}
          RUN_LABEL: ${{ steps.meta.outputs.run_label }}
          LOG_PATH: ${{ steps.build.outputs.log_path }}
          EXIT_CODE: ${{ steps.build.outputs.exit_code }}
        run: |
          set -euo pipefail

          manifest_path="$(grep -rl -- "- Run Label: ${RUN_LABEL}" status/builds | head -n1 || true)"
          iso_path="$(find "build/github-out/${MODE}" -maxdepth 1 -type f -name '*.iso' | head -n1 || true)"
          handoff_path="$(find "build/github-handoff/${MODE}" -maxdepth 1 -mindepth 1 -type d | head -n1 || true)"

          {
            echo "## Lumina-OS ${MODE} build"
            echo ""
            echo "- Run Label: \`${RUN_LABEL}\`"
            echo "- Build Exit Code: \`${EXIT_CODE:-not-recorded}\`"
            echo "- Build Manifest: \`${manifest_path:-not-found}\`"
            echo "- ISO Path: \`${iso_path:-not-found}\`"
            echo "- Handoff Folder: \`${handoff_path:-not-found}\`"
            if [[ -n "${LOG_PATH}" && -f "${LOG_PATH}" ]]; then
              echo ""
              echo "### Log Tail"
              echo '```text'
              tail -n 80 "${LOG_PATH}"
              echo '```'
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload ISO artifact
        if: always() && steps.selection.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: lumina-os-${{ matrix.mode }}-${{ steps.meta.outputs.run_label }}
          path: |
            build/github-out/${{ matrix.mode }}/*.iso
            build/github-handoff/${{ matrix.mode }}/
            build/github-logs/${{ matrix.mode }}/
            status/builds/*.md
          if-no-files-found: error
          retention-days: 14

      - name: Fail job when build step failed
        if: steps.selection.outputs.skip != 'true' && steps.build.outputs.exit_code != '0'
        shell: bash
        env:
          MODE: ${{ matrix.mode }}
          LOG_PATH: ${{ steps.build.outputs.log_path }}
        run: |
          set -euo pipefail

          if [[ -n "${LOG_PATH}" && -f "${LOG_PATH}" ]]; then
            log_tail="$(tail -n 25 "${LOG_PATH}")"
            log_tail="${log_tail//'%'/'%25'}"
            log_tail="${log_tail//$'\n'/'%0A'}"
            log_tail="${log_tail//$'\r'/'%0D'}"
            echo "::error title=Lumina-OS ${MODE} build failure tail::${log_tail}"
          fi

          echo "Build container failed with exit code: ${{ steps.build.outputs.exit_code }}" >&2
          exit 1

      - name: Summarize skipped mode
        if: steps.selection.outputs.skip == 'true'
        shell: bash
        run: |
          {
            echo "## Lumina-OS ${{ matrix.mode }} build"
            echo ""
            echo "- Status: skipped"
            echo "- Reason: workflow_dispatch selected a different build set"
          } >> "${GITHUB_STEP_SUMMARY}"
