<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AhmadOS Login</title>
  <link rel="stylesheet" href="../shared/theme.css">
</head>
<body>
  <main class="page">
    <header class="masthead">
      <div class="brand-mark">
        <span class="brand-orb"></span>
        <div class="brand-copy">
          <strong>AhmadOS</strong>
          <span>SDDM direction prototype</span>
        </div>
      </div>
      <div class="status-row">
        <span class="pill">Minimal login</span>
        <span class="pill">Wallpaper-led</span>
      </div>
    </header>

    <section class="login-shell">
      <div class="login-stage">
        <div class="login-time">
          <strong>12:48</strong>
          <span>Tuesday, March 31</span>
        </div>

        <article class="login-card">
          <div class="avatar-ring">
            <div class="avatar-core">A</div>
          </div>
          <p class="eyebrow">Sign in</p>
          <h1 class="section-title">AhmadOS Live Session</h1>
          <p class="card-text">A calm SDDM direction with one centered entry point and no unnecessary noise.</p>

          <div class="login-field">Password</div>

          <div class="button-row">
            <a class="btn" href="#">Unlock</a>
            <a class="btn-secondary" href="#">Session: Plasma X11</a>
          </div>

          <div class="status-row" style="margin-top: 18px;">
            <span class="status-pill light">Arabic</span>
            <span class="status-pill light">Restart</span>
            <span class="status-pill light">Shutdown</span>
          </div>
        </article>
      </div>
    </section>
  </main>
</body>
</html>
